name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx biome check
      - run: npx tsc --noEmit
      - run: npm test -- --ci
      # Shared `.next/cache` with the `frontend-e2e` job (same cache
      # key). First run to populate, subsequent runs get near-instant
      # incremental builds. See the matching block in `frontend-e2e`
      # for the rationale on key/path.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.ts', 'frontend/src/**/*.tsx', 'frontend/src/**/*.js', 'frontend/src/**/*.jsx', 'frontend/src/**/*.json', 'frontend/src/**/*.css', 'frontend/next.config.js', 'frontend/postcss.config.mjs', 'frontend/tsconfig.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-
      - run: npm run build

  frontend-e2e:
    # Public-API smoke against a Playwright-managed Next production
    # server (`next build && next start`). Runs in parallel with
    # `frontend`; no wallet keys required. The api-smoke project is
    # excluded (requires WALLET_KEY_A/B secrets).
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      # Cache Next's incremental build output. `.next/cache/` contains
      # the webpack/turbopack compile results keyed on source hashes,
      # so a rebuild on the same SHA is ~instant and unrelated SHAs
      # still benefit from partial hits. Keyed on source file hashes
      # so unrelated workflow changes don't bust the cache.
      #
      # Pattern note: `@actions/glob` does NOT support brace expansion
      # (`{ts,tsx}`), so each extension is listed explicitly.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**/*.ts', 'frontend/src/**/*.tsx', 'frontend/src/**/*.js', 'frontend/src/**/*.jsx', 'frontend/src/**/*.json', 'frontend/src/**/*.css', 'frontend/next.config.js', 'frontend/postcss.config.mjs', 'frontend/tsconfig.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-
            nextjs-${{ runner.os }}-
      # Playwright's webServer command for CI is `npm run start` (gated
      # on process.env.CI in playwright.config.ts), which assumes the
      # production bundle already exists. Build it here as a separate
      # step so failures are clearly attributed.
      - run: npm run build
      - run: npx playwright test --project=ci-smoke --reporter=list,github
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  sdk:
    # @nearly/sdk is a standalone workspace under packages/sdk with its own
    # biome/tsc/jest.
    #
    # The integration suite (__tests__/integration.test.ts) self-skips when
    # OUTLAYER_TEST_WALLET_KEY is absent, so CI covers the unit layer only.
    # Run it manually as a pre-release check: `OUTLAYER_TEST_WALLET_KEY=wk_...
    # npx jest integration` (the caller's account_id is resolved from
    # /wallet/v1/balance at test startup — no separate env var). Source
    # frontend/.env to run it with the same creds smoke.sh uses.
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json
      - run: npm ci
      - run: npx biome check
      - run: npx tsc --noEmit
      - run: npx jest --ci
      # Build the `nearly` CLI bin and smoke-test its entry points. Catches
      # tsconfig.cli.json regressions (emit path, shebang, chmod) that the
      # unit suite doesn't see — the bin is built from the same source but
      # through a different compiler config.
      - run: npm run build:cli
      - run: node dist/cli/index.js help
      - run: |
          if node dist/cli/index.js heartbeat wk_fake_token_for_guard_check; then
            echo "ERROR: wk_ argv guard did not reject" >&2
            exit 1
          fi

  scripts:
    # Syntax-check shell and Node scripts so parse errors don't hide until
    # someone runs them locally.
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
      - name: Shell syntax check
        run: |
          for f in scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done
      - name: Node syntax check
        run: |
          for f in scripts/*.mjs; do
            echo "node --check $f"
            node --check "$f"
          done

  wasm:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: Build release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo build --target wasm32-wasip2 --release -p nearly
      - name: Upload and deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          OUTLAYER_CREDENTIALS: ${{ secrets.OUTLAYER_CREDENTIALS }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/out-layer/outlayer-cli/main/install.sh | sh
          mkdir -p ~/.outlayer/mainnet
          echo "$OUTLAYER_CREDENTIALS" > ~/.outlayer/mainnet/credentials.json
          echo "mainnet" > ~/.outlayer/default-network
          URL=$(outlayer upload ../target/wasm32-wasip2/release/nearly.wasm 2>&1 | awk '/^FastFS URL:/{print $3}')
          if [ -z "$URL" ]; then echo "ERROR: failed to parse FastFS URL from upload output"; exit 1; fi
          echo "Uploaded: $URL"
          for i in $(seq 1 12); do
            curl -sf -o /dev/null "$URL" && break
            echo "Waiting for FastFS indexer... (attempt $i)"
            sleep 10
          done
          outlayer deploy nearly "$URL" || echo "Deploy skipped (version already exists)"

