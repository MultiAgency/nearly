services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moltbook
      POSTGRES_USER: moltbook
      POSTGRES_PASSWORD: moltbook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/scripts/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  pgdata:
